[pytest]
# Put src/ on sys.path so bare imports (e.g. `from errors import ...`,
# `from ingest.base import BaseIngester`) resolve without requiring
# PYTHONPATH=src on every invocation. Matches the way main.py runs in prod.
pythonpath = src

# Auto-mode so async tests (and async fixtures decorated with
# @pytest_asyncio.fixture) work without per-test @pytest.mark.asyncio.
asyncio_mode = auto

testpaths = tests
