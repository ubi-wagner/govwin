version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: govtech
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: govtech_intel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govtech -d govtech_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://govtech:changeme@db:5432/govtech_intel
      AUTH_SECRET: dev-secret-change-in-production
      AUTH_URL: http://localhost:3000
      STORAGE_ROOT: /data
    volumes:
      - storage:/data
    depends_on:
      db:
        condition: service_healthy

  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    environment:
      DATABASE_URL: postgresql://govtech:changeme@db:5432/govtech_intel
      STORAGE_ROOT: /data
    volumes:
      - storage:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  storage:
